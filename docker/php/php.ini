; Autor: DannGzShot
; Fecha de creacion: 16/03/2026
; Descripcion: Ajusta parametros PHP para los contenedores del entorno local.

display_errors=Off
display_startup_errors=Off
log_errors=On
error_reporting=E_ALL
error_log=/proc/self/fd/2
output_buffering=4096
realpath_cache_size=16M
realpath_cache_ttl=600
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=30000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
opcache.save_comments=1
auto_prepend_file=/home/git/repositorios/docker/php/bootstrap-local.php
include_path=".:/usr/local/lib/php:/var/www/html/web/atomic:/var/www/html/web/atomic/core:/var/www/html/web/atomic/lib:/var/www/html/web/atomic/lib/php-route:/var/www/html/web/atomic/lib/php-route/src:/home/redgps/commons:/home/redgps/commons/libs:/home/redgps/commons/helpers:/var/www/html/web/redgps/sources:/var/www/html/web/redgps/sources/lib"
