# Descripcion: Configura los VirtualHosts internos de DEV usados por el gateway Docker.

ServerName localhost

<VirtualHost *:18081>
    ServerName dev.redgps.local
    DocumentRoot /var/www/html/web/redgps/public

    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn

    Alias /commons /home/redgps/commons/media
    Alias /public /home/redgps/commons/public

    <Directory /var/www/html/web/redgps/public>
        Options Indexes FollowSymLinks MultiViews
        DirectoryIndex index.php
        AllowOverride None
        Require all granted
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    <Directory /home/redgps/commons/media>
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /home/redgps/commons/public>
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:18081>
    ServerName dev.reportes.local
    DocumentRoot /var/www/html/web/reportes/public

    SetEnvIf X-Forwarded-Proto "^https$" HTTPS=on

