# Descripcion: Configura VirtualHosts y alias locales para aplicaciones REDGPS en Docker.

# =================================================================
# 1. VIRTUALHOST: HERRAMIENTAS SECUNDARIAS (partners, reportes, etc)
# =================================================================
<VirtualHost *:18080>
    ServerName localhost
    DocumentRoot /var/www/html/empty

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn

    # Alias de subproyectos
    Alias /partners /var/www/html/web/partners/public
    Alias /reportes /var/www/html/web/reportes/public
    Alias /redgps /var/www/html/web/redgps/public
    Alias /testing /var/www/html/web/redgps/public

    # Alias de recursos compartidos
    Alias /commons /home/redgps/commons/media
    Alias /public /home/redgps/commons/public
    Alias /staticimg /var/www/html/web/partners/public/Files
    Alias /vehimages /var/www/html/web/partners/public/Files/VEHICULO

    # Regla base de redirección
    RewriteEngine On
    RewriteRule ^/?$ /redgps/ [R=302,L]

    # --- Permisos de Directorios ---
    <Directory /var/www/html/empty>
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/web/partners/public>
        Options Indexes FollowSymLinks MultiViews
        DirectoryIndex index.php
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /partners/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    <Directory /var/www/html/web/reportes/public>
        Options Indexes FollowSymLinks MultiViews
        DirectoryIndex index.php
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /reportes/
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    <Directory /var/www/html/web/partners/public/Files>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/web/partners/public/Files/VEHICULO>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>


# =================================================================
# 2. VIRTUALHOST: EXCLUSIVO PARA REDGPS (El que usaremos ahora)
# =================================================================
<VirtualHost *:18080>
    # Este es el dominio que agregaste a tu archivo /etc/hosts
    ServerName dev.redgps.local
    
    # Apuntamos DIRECTAMENTE a la carpeta public de RedGPS
    DocumentRoot /var/www/html/web/redgps/public

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn

    # Alias que tu sistema necesita leer desde la raíz
    Alias /commons /home/redgps/commons/media
    Alias /public /home/redgps/commons/public

    # --- Permisos y Enrutamiento de Atomic ---
    <Directory /var/www/html/web/redgps/public>
        Options Indexes FollowSymLinks MultiViews
        DirectoryIndex index.php
        AllowOverride All
        Require all granted

        # Al estar en la raíz, NO usamos RewriteBase
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # Todo lo que no sea un archivo real, se envía a index.php
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    <Directory /home/redgps/commons/media>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /home/redgps/commons/public>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>


