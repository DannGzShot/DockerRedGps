# Descripcion: Configura el proxy HTTPS local que redirige trafico hacia DEV y QA.

ServerName localhost

<VirtualHost *:18080>
    ServerName dev.redgps.local
    ServerAlias dev.reportes.local dev.partners.local
    ServerAlias qa.redgps.local qa.reportes.local qa.partners.local

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}:8001%{REQUEST_URI} [R=302,L]
</VirtualHost>

<VirtualHost *:8001>
    ServerName dev.redgps.local
    ServerAlias dev.reportes.local dev.partners.local

    SSLEngine on
    SSLCertificateFile /etc/ssl/localcerts/dev.redgps.local.crt
    SSLCertificateKeyFile /etc/ssl/localcerts/dev.redgps.local.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "8001"

    ProxyPass / http://127.0.0.1:18081/
    ProxyPassReverse / http://127.0.0.1:18081/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn
</VirtualHost>

<VirtualHost *:8001>
    ServerName qa.redgps.local
    ServerAlias qa.reportes.local qa.partners.local

    SSLEngine on
    SSLCertificateFile /etc/ssl/localcerts/dev.redgps.local.crt
    SSLCertificateKeyFile /etc/ssl/localcerts/dev.redgps.local.key

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "8001"

    ProxyPass / http://127.0.0.1:18082/
    ProxyPassReverse / http://127.0.0.1:18082/

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
    LogLevel warn
</VirtualHost>
